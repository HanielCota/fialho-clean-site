name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npx eslint .

      - name: Format check
        run: npx prettier --check "src/**/*.{astro,ts,css}"

      - name: Type check
        run: npx astro check

      - name: Build
        run: npm run build
